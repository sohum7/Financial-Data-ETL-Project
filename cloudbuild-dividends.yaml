steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-dividends-extract-function-job'
    entrypoint: bash
    env:
      - GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - ENVIRONMENT=$_ENV
    args:
      - -c
      - |
        # Deploy dividends extract cloud function
        echo "**** Building dividends extraction process ****"

        # exit immediately if a command exits with a non-zero status, and prevents partial deployment
        set -e

        # DEBUG: print substitutions at runtime
        echo ===================================================
        echo =========+==== Debug Build Variables ==============
        echo "GOOGLE_CLOUD_PROJECT=$$GOOGLE_CLOUD_PROJECT"
        echo "ENVIRONMENT=$$ENVIRONMENT"
        echo ===================================================

        # Prepare the Cloud Function source code directory
        rm  -rf  ms_div_extract_cf
        mkdir  -p  ms_div_extract_cf

        # Copy Cloud Function entrypoint + requirements + extraction logic
        mkdir  -p  ms_div_extract_cf/extract
        cp -r dividends/extract/.  ms_div_extract_cf/extract/
        
        # Copy shared files
        mkdir  -p  ms_div_extract_cf/shared
        cp  -r  dividends/shared/.  ms_div_extract_cf/shared/

        # Deploy the Cloud Function using gcloud CLI
        echo "**** Deploying Cloud Function ****"
        gcloud functions deploy market-stack-dividends-extract \
          --gen2 \
          --runtime=python310 \
          --region=us-central1 \
          --project=$$GOOGLE_CLOUD_PROJECT \
          --service-account=market-stack-func-gcs-uploader@$$GOOGLE_CLOUD_PROJECT.iam.gserviceaccount.com \
          --entry-point=extract_dividends \
          --source=ms_div_extract_cf \
          --allow-unauthenticated \
          --trigger-http \
          --min-instances=0 \
          --max-instances=1 \
          --timeout=480s \
          --set-env-vars ENVIRONMENT=$$ENVIRONMENT,GOOGLE_CLOUD_PROJECT=$$GOOGLE_CLOUD_PROJECT

        if [ $? -eq 0 ]; then
          echo "✅ Cloud Function deployed successfully."
        else
          echo "❌ Deployment failed."
          exit 1
        fi
    waitFor: ['-']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'submit-dividends-transform-dataproc-job'
    entrypoint: bash
    env:
      - GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - ENVIRONMENT=$_ENV
    args:
      - -c
      - |
        # Submit Dataproc job for dividends transformation
        echo "**** Submitting Dataproc job for dividends transformation ****"

        # exit immediately if a command exits with a non-zero status, and prevents partial deployment
        set -e
        # Submit the Dataproc job using gcloud CLI
        gcloud dataproc jobs submit pyspark gs://market-stack-code-dev/dataproc/dividends/transform_job.py \
          --cluster=market-stack-dataproc-dev \
          --region=us-central1 \
          --project=$$GOOGLE_CLOUD_PROJECT \
          --py-files=
          

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
  machineType: 'E2_HIGHCPU_8'

