steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Cloud Function'
    entrypoint: bash
    env:
      - 'ENVIRONMENT=$_ENV'
      - 'BUCKET_SUFFIX=$_BUCKET_SUFFIX'
      - 'GOOGLE_CLOUD_PROJECT=$_PROJECT'
    args:
      - -c
      - |
        echo "**** Uploading Cloud Function source code... ****"
        if gcloud functions deploy market-stack-dividends-extract \
          --gen2 \
          --runtime=python310 \
          --region=us-central1 \
          --project=$GOOGLE_CLOUD_PROJECT \
          --service-account=market-stack-func-gcs-uploader@project-e6aecb7b-2aa0-4815-8c3.iam.gserviceaccount.com \
          --entry-point=extract_dividends \
          --source=dividends \
          --set-env-vars ENVIRONMENT=$ENVIRONMENT,BUCKET_SUFFIX=$BUCKET_SUFFIX,GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT \
          --allow-unauthenticated \
          --trigger-http \
          --min-instances=0 \
          --max-instances=1 \
          --timeout=480s;
        then
          echo "Cloud Function deployed successfully."
        else
          echo "Failed to deploy Cloud Function."
          exit 1
        fi

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Upload PySpark Job'
    entrypoint: bash
    args:
      - -c
      - |
        echo "**** Copying transfer.py to GCS bucket... ****"
        if gsutil cp dividends/src/transform/transformer.py gs://market-stack-code-dev/dataproc/dividends/transform/transformer.py \
          --set-env-vars ENVIRONMENT=$ENVIRONMENT,BUCKET_SUFFIX=$BUCKET_SUFFIX,GOOGLE_CLOUD_PROJECT=$GOOGLE_CLOUD_PROJECT;
        then
          echo "File copied successfully."
        else
          echo "Failed to copy file."
          exit 1
        fi

options:
  logging: CLOUD_LOGGING_ONLY